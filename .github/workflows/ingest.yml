name: SEC EDGAR Ingestion

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: "Named preset from config/ingestion/runs.yaml — overrides all other inputs if set"
        required: false
        type: string
      endpoint:
        description: "Endpoint name — ignored if run_name is set"
        required: false
        default: company_tickers
        type: choice
        options:
          - company_tickers
          - company_submissions
          - company_facts
          - company_concept
          - xbrl_frames
      cik:
        description: "10-digit zero-padded CIK (company_* endpoints)"
        required: false
        type: string
      taxonomy:
        description: "XBRL taxonomy, e.g. us-gaap"
        required: false
        type: string
      concept:
        description: "XBRL concept, e.g. Assets"
        required: false
        type: string
      unit:
        description: "Unit, e.g. USD"
        required: false
        type: string
      period:
        description: "Period — duration: CY2023 | instant (balance sheet): CY2023Q4I"
        required: false
        type: string

  schedule:
    # Daily at 06:00 UTC — runs presets with schedule: true
    - cron: "0 6 * * *"
    # Quarterly on the 1st of Jan, Apr, Jul, Oct — runs presets with schedule: quarterly
    - cron: "0 6 1 1,4,7,10 *"

jobs:
  ingest:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
      BQ_DATASET: ${{ secrets.BQ_DATASET }}
      # BQ_LOCATION is not a secret — hardcoded to avoid masking "US" inside "USD" in logs
      BQ_LOCATION: US
      EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
      DBT_KEYFILE: /tmp/sa_key.json

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # GCP_SA_KEY holds the full JSON content of the service account key.
      # Written to a temp file here; DBT_KEYFILE points to it above.
      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      # Daily schedule: run all presets with schedule: true
      - name: Run ingestion (daily scheduled presets)
        if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'
        run: |
          uv run python - <<'EOF'
          import yaml, subprocess, sys
          runs = yaml.safe_load(open("config/ingestion/runs.yaml"))["runs"]
          for name, cfg in runs.items():
              if cfg.get("schedule") is not True:
                  continue
              print(f"Running preset: {name}", flush=True)
              result = subprocess.run(
                  ["uv", "run", "python", "-m", "src.ingestion.ingestor", "run", "--preset", name]
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          EOF

      # Quarterly schedule: run all presets with schedule: quarterly
      - name: Run ingestion (quarterly scheduled presets)
        if: github.event_name == 'schedule' && github.event.schedule == '0 6 1 1,4,7,10 *'
        run: |
          uv run python - <<'EOF'
          import yaml, subprocess, sys
          runs = yaml.safe_load(open("config/ingestion/runs.yaml"))["runs"]
          for name, cfg in runs.items():
              if cfg.get("schedule") != "quarterly":
                  continue
              print(f"Running preset: {name}", flush=True)
              result = subprocess.run(
                  ["uv", "run", "python", "-m", "src.ingestion.ingestor", "run", "--preset", name]
              )
              if result.returncode != 0:
                  sys.exit(result.returncode)
          EOF

      # Dispatch with a named preset from runs.yaml
      - name: Run ingestion (named preset)
        if: github.event_name == 'workflow_dispatch' && inputs.run_name != ''
        run: |
          uv run python -m src.ingestion.ingestor run --preset "${{ inputs.run_name }}"

      # Dispatch with manual inputs (no run_name)
      - name: Run ingestion (manual inputs)
        if: github.event_name == 'workflow_dispatch' && inputs.run_name == ''
        run: |
          uv run python -m src.ingestion.ingestor run \
            --endpoint "${{ inputs.endpoint }}" \
            ${{ inputs.cik      && format('--cik {0}',      inputs.cik)      || '' }} \
            ${{ inputs.taxonomy && format('--taxonomy {0}', inputs.taxonomy) || '' }} \
            ${{ inputs.concept  && format('--concept {0}',  inputs.concept)  || '' }} \
            ${{ inputs.unit     && format('--unit {0}',     inputs.unit)     || '' }} \
            ${{ inputs.period   && format('--period {0}',   inputs.period)   || '' }}
