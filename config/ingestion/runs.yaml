# Named ingestion presets.
# Run locally:   python -m src.ingestion.ingestor run --preset <name>
# Run in CI:     enter <name> in the run_name field of the workflow_dispatch input
#
# schedule: true       → included in the daily cron (06:00 UTC)
# schedule: quarterly  → included in the quarterly cron (1 Jan, Apr, Jul, Oct)
#
# Param types:
#   scalar              cik: "0000320193"
#   list                cik: ["0000320193", "0000789019"]   — cartesian product across all list params
#   period interval     period: {from: CY2022Q1, to: CURRENT}
#
# CURRENT resolves at runtime to the most recent period with data available in EDGAR:
#   CY{year}    → CY{last_year}  (annual, filed by ~April)
#   CY{year}Q{n} → CY{year}Q{n} of the last complete quarter minus a 45-day filing lag
#   CY{year}Q{n}I → same, with the I (instant) suffix

runs:

  # ── Daily ─────────────────────────────────────────────────────────────────
  daily_tickers:
    endpoint: company_tickers
    bigquery_table: raw_company_tickers
    write_disposition: WRITE_TRUNCATE
    row_transform: dict_values   # response is {index: row} — extract values as row list
    schedule: true

  # ── Quarterly ─────────────────────────────────────────────────────────────
  all_company_submissions:
    endpoint: company_submissions
    bigquery_table: raw_company_submissions
    write_disposition: WRITE_APPEND
    schedule: quarterly
    cik:
      - "0000320193"  # Apple
      - "0000789019"  # Microsoft
      - "0001652044"  # Alphabet
      - "0001018724"  # Amazon
      - "0001326801"  # Meta
      - "0001318605"  # Tesla
      - "0001045810"  # NVIDIA
      - "0000019617"  # JPMorgan Chase

  all_company_facts:
    endpoint: company_facts
    bigquery_table: raw_company_facts
    write_disposition: WRITE_APPEND
    schedule: quarterly
    cik:
      - "0000320193"  # Apple
      - "0000789019"  # Microsoft
      - "0001652044"  # Alphabet
      - "0001018724"  # Amazon
      - "0001326801"  # Meta
      - "0001318605"  # Tesla
      - "0001045810"  # NVIDIA
      - "0000019617"  # JPMorgan Chase

  # ── XBRL frames — balance sheet (quarterly instants) ──────────────────────
  balance_sheet_snapshots:
    endpoint: xbrl_frames
    bigquery_table: raw_balance_sheet_snapshots
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: USD
    concept:
      - Assets
      - Liabilities
      - StockholdersEquity
      - CashAndCashEquivalentsAtCarryingValue
      - LongTermDebt
      - RetainedEarningsAccumulatedDeficit
      - AccountsReceivableNetCurrent
      - InventoryNet
      - Goodwill
    period:
      from: CY2025Q1I
      to: CURRENT   # expands to every quarterly instant from CY2025Q1I to latest available

  # ── XBRL frames — income statement (annual) ───────────────────────────────
  income_statement_annual:
    endpoint: xbrl_frames
    bigquery_table: raw_income_statement_annual
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: USD
    concept:
      - Revenues
      - CostOfRevenue
      - GrossProfit
      - OperatingIncomeLoss
      - ResearchAndDevelopmentExpense
      - SellingGeneralAndAdministrativeExpense
      - DepreciationDepletionAndAmortization
      - InterestExpense
      - IncomeTaxExpenseBenefit
      - NetIncomeLoss
    period:
      from: CY2025
      to: CURRENT   # expands to CY2025, CY2024, ... latest complete fiscal year

  # ── XBRL frames — income statement (quarterly) ────────────────────────────
  income_statement_quarterly:
    endpoint: xbrl_frames
    bigquery_table: raw_income_statement_quarterly
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: USD
    concept:
      - Revenues
      - GrossProfit
      - OperatingIncomeLoss
      - NetIncomeLoss
    period:
      from: CY2025Q1
      to: CURRENT   # expands to CY2025Q1, CY2025Q2, ... latest complete quarter

  # ── XBRL frames — cash flow (annual) ──────────────────────────────────────
  cash_flow_annual:
    endpoint: xbrl_frames
    bigquery_table: raw_cash_flow_annual
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: USD
    concept:
      - NetCashProvidedByUsedInOperatingActivities
      - NetCashProvidedByUsedInInvestingActivities
      - NetCashProvidedByUsedInFinancingActivities
      - PaymentsToAcquirePropertyPlantAndEquipment
      - PaymentsForRepurchaseOfCommonStock
      - PaymentsOfDividends
      - DepreciationDepletionAndAmortization
    period:
      from: CY2025
      to: CURRENT

  # ── XBRL frames — cash flow (quarterly) ───────────────────────────────────
  cash_flow_quarterly:
    endpoint: xbrl_frames
    bigquery_table: raw_cash_flow_quarterly
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: USD
    concept:
      - NetCashProvidedByUsedInOperatingActivities
      - PaymentsToAcquirePropertyPlantAndEquipment
    period:
      from: CY2025Q1
      to: CURRENT

  # ── XBRL frames — EPS (annual, USD-per-shares unit) ───────────────────────
  shares_and_eps_annual:
    endpoint: xbrl_frames
    bigquery_table: raw_shares_and_eps_annual
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: USD-per-shares
    concept:
      - EarningsPerShareBasic
      - EarningsPerShareDiluted
    period:
      from: CY2025
      to: CURRENT

  # ── XBRL frames — share counts (shares unit) ──────────────────────────────
  shares_outstanding:
    endpoint: xbrl_frames
    bigquery_table: raw_shares_outstanding
    write_disposition: WRITE_APPEND
    taxonomy: us-gaap
    unit: shares
    concept:
      - CommonStockSharesOutstanding
      - WeightedAverageNumberOfSharesOutstandingBasic
    period:
      from: CY2025Q1I
      to: CURRENT

